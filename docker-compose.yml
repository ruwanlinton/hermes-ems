version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: slmc
      POSTGRES_PASSWORD: slmc
      POSTGRES_DB: slmc_omr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slmc -d slmc_omr"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://slmc:slmc@postgres:5432/slmc_omr
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-8}
      UPLOAD_DIR: /tmp/slmc_uploads
      FILL_THRESHOLD: "0.50"
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/tmp/slmc_uploads

  frontend:
    build: ./frontend
    ports:
      - "3000:8080"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
